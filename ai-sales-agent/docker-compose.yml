services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB_NAME=ai_sales_agent
    ports:
      - "8000:8000"
    depends_on:
      - mongo

volumes:
  mongo_data:

